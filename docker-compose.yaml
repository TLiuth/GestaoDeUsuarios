services:
  postgres:
    image: postgres:16-alpine
    container_name: user_manager_db
    environment:
      POSTGRES_DB: user_manager
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d user_manager"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - user_manager_network
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    container_name: user_manager_backend
    environment:
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: user_manager
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      TYPEORM_LOGGING: "true"
      SESSION_SECRET: temporaryKey
      FRONTEND_ORIGIN: http://localhost:${FRONTEND_PORT:-3000}
      PORT: 3001
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT:-3001}:3001"
    networks:
      - user_manager_network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:${BACKEND_PORT:-3001}
        INTERNAL_API_URL: http://backend:3001
    container_name: user_manager_frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:${BACKEND_PORT:-3001}
      INTERNAL_API_URL: http://backend:3001
      PORT: 3000
      NODE_ENV: production
    depends_on:
      backend:
        condition: service_started
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    networks:
      - user_manager_network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  user_manager_network:
    driver: bridge